project:
  name: bad_solder_mask_dam_jlc_process
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets:
    GND:
      kind: ground
  layout:
    solder_mask:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Mask
          polarity: dark
          net: GND
          owner_kind: pad
          component: U1
          pin: "1"
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D11
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
        - at: { x_mm: 11.08, y_mm: 10.0 }
          layer: F.Mask
          polarity: dark
          net: GND
          owner_kind: pad
          component: U1
          pin: "2"
          source_primitive: gerber_flash
          source_primitive_index: 1
          aperture: D11
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
scenarios:
  - name: solder_mask_dam
    type: manufacturing
    checks:
      - SOLDER_MASK_DAM_VALID
    parameters:
      fabrication_process: jlcpcb_standard_2026_06
