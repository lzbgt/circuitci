project:
  name: bad_drill_diameter_jlc_process
  version: 0.1.0
  description: Drill diameters outside the source-backed JLC circular drill range are rejected.
libraries:
  - ../../libs/generic
board:
  components: {}
  nets: {}
  layout:
    drills:
      - at:
          x_mm: 2.0
          y_mm: 2.0
        drill_mm: 0.1
        plating: plated
        tool: T01
        source_hit_index: 0
      - at:
          x_mm: 6.0
          y_mm: 2.0
        drill_mm: 6.4
        plating: non_plated
        tool: T02
        source_hit_index: 1
scenarios:
  - name: jlc_drill_diameter
    type: manufacturing
    checks:
      - DRILL_DIAMETER_VALID
    parameters:
      fabrication_process: jlcpcb_drill_diameter_range_2026_06
