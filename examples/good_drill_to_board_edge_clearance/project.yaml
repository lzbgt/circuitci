project:
  name: good_drill_to_board_edge_clearance
  version: 0.1.0

libraries: []

board:
  components: {}
  nets: {}
  layout:
    outline:
      segments:
        - start: { x_mm: 0.0, y_mm: 0.0 }
          end: { x_mm: 10.0, y_mm: 0.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 0
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
        - start: { x_mm: 10.0, y_mm: 0.0 }
          end: { x_mm: 10.0, y_mm: -10.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 1
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
        - start: { x_mm: 10.0, y_mm: -10.0 }
          end: { x_mm: 0.0, y_mm: -10.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 2
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
        - start: { x_mm: 0.0, y_mm: -10.0 }
          end: { x_mm: 0.0, y_mm: 0.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 3
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
    drills:
      - at: { x_mm: 2.0, y_mm: -2.0 }
        drill_mm: 1.0
        plating: non_plated
        layer: NPTH_Through
        tool: T01
        source_hit_index: 0

scenarios:
  - name: drill_to_board_edge_clearance
    type: manufacturing
    checks:
      - DRILL_TO_BOARD_EDGE_CLEARANCE_VALID
    parameters:
      min_drill_edge_clearance_mm: 0.5
