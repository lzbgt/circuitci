project:
  name: scenario_suggestions_level_shifter
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: mcu_3v3
      pins:
        VDD: mcu_3v3
        GND: gnd
        RX: mcu_rx_shifted
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: usb_uart_3v3
      pins:
        VCC: usb_uart_3v3
        GND: gnd
        TXD: usb_uart_tx
        RXD: usb_uart_rx
    U3:
      model: generic.level_shifter.basic
      part_number: GENERIC_LEVEL_SHIFTER
      power_domains:
        VCCA: mcu_3v3
        VCCB: usb_uart_3v3
      pins:
        VCCA: mcu_3v3
        VCCB: usb_uart_3v3
        GND: gnd
        A1: mcu_rx_shifted
        B1: usb_uart_tx
        OE: usb_uart_3v3
  nets:
    mcu_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: false
    usb_uart_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    mcu_rx_shifted:
      kind: digital_or_analog
    usb_uart_tx:
      kind: digital_or_analog
    usb_uart_rx:
      kind: digital_or_analog

scenarios: []
