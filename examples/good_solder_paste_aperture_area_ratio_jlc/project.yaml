project:
  name: good_solder_paste_aperture_area_ratio_jlc
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets: {}
  layout:
    solder_paste:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Paste
          polarity: dark
          owner_kind: pad
          component: U1
          pin: "1"
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: rect
          size: { x_mm: 0.28, y_mm: 0.28 }
scenarios:
  - name: solder_paste_aperture_area_ratio
    type: manufacturing
    checks:
      - SOLDER_PASTE_APERTURE_AREA_RATIO_VALID
    parameters:
      fabrication_process: jlcpcb_stencil_area_ratio_2026_06
      stencil_thickness_mm: 0.10
