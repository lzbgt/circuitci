project:
  name: good_usb_connector_route_geometry
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    J1:
      model: generic.connector.usb2
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
    UESD:
      model: generic.protection.usb_esd_basic
      pins:
        DP: usb_dp
        DM: usb_dm
        GND: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
  layout:
    placements:
      J1:
        x_mm: 0.0
        y_mm: 0.0
        side: top
      UESD:
        x_mm: 1.0
        y_mm: 0.0
        side: top
    routes:
      usb_dp:
        segments:
          - start: { x_mm: 0.0, y_mm: 0.0 }
            end: { x_mm: 1.0, y_mm: 0.0 }
            width_mm: 0.15
            layer: F.Cu
      usb_dm:
        segments:
          - start: { x_mm: 0.0, y_mm: 0.0 }
            end: { x_mm: 1.0, y_mm: 0.0 }
            width_mm: 0.15
            layer: F.Cu

scenarios:
  - name: usb_route_geometry
    type: interface_protection
    checks:
      - USB_ROUTE_GEOMETRY_VALID
    target:
      component: J1
    parameters:
      max_data_line_route_length_mm: 5.0
      max_data_line_via_count: 0
      max_connector_to_protection_route_distance_mm: 2.0
      max_component_to_route_distance_mm: 0.1
