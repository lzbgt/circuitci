project:
  name: bad_regulator_output_current
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ./models

board:
  components:
    V1:
      model: generic.analog.dc_voltage_source
      part_number: USB_5V_SOURCE
      pins:
        P: usb_5v
        N: gnd
    UREG:
      model: fixture.tiny_regulator
      part_number: TINY_LDO
      power_domains:
        VIN: usb_5v
        VOUT: rail_3v3
      pins:
        VIN: usb_5v
        VOUT: rail_3v3
        GND: gnd
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: rail_3v3
      pins:
        VCC: rail_3v3
        GND: gnd
  nets:
    usb_5v:
      kind: power
      nominal_voltage: 5.0
      powered: true
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground

scenarios:
  - name: regulator_output_current_budget
    type: power_tree
    checks:
      - POWER_TREE_VALID
