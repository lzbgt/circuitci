project:
  name: um_stm32l4_usb_downloader_physical_spice
  version: 0.1.0

libraries:
  - ../../libs/generic/analog
  - ../../libs/vendor/st
  - ../../libs/vendor/wch
  - ../../libs/vendor/onsemi/discrete

board:
  components:
    VVDD:
      model: generic.analog.dc_voltage_source
      pins:
        P: vdd_3v3
        N: gnd
      spice:
        primitive: dc_voltage_source
        dc_v: 3.3
    VDTR:
      model: generic.analog.pulse_voltage_source
      pins:
        P: ch340_dtr_n
        N: gnd
      spice:
        primitive: pulse_voltage_source
        pulse:
          initial_v: 0
          pulsed_v: 3.3
          delay_us: 4900
          rise_us: 0.02
          fall_us: 0.02
          width_us: 10000
          period_us: 20000
    VRTS:
      model: generic.analog.pulse_voltage_source
      pins:
        P: ch340_rts_n
        N: gnd
      spice:
        primitive: pulse_voltage_source
        pulse:
          initial_v: 0
          pulsed_v: 3.3
          delay_us: 5000
          rise_us: 0.02
          fall_us: 0.02
          width_us: 10000
          period_us: 20000
    U1:
      model: vendor.st.stm32l431vct6
      part_number: STM32L431VCT6
      power_domains:
        VDD: vdd_3v3
      pins:
        VDD: vdd_3v3
        VSS: gnd
        NRST: nrst
        BOOT0: boot0
    U5:
      model: vendor.wch.ch340c
      part_number: CH340C
      power_domains:
        VCC: vdd_3v3
      pins:
        VCC: vdd_3v3
        GND: gnd
        DTR_N: ch340_dtr_n
        RTS_N: ch340_rts_n
    R1:
      model: generic.analog.resistor
      pins:
        A: ch340_dtr_n
        B: q3_base
      spice:
        primitive: resistor
        value_ohm: 1000
    R26:
      model: generic.analog.resistor
      pins:
        A: ch340_rts_n
        B: q2_base
      spice:
        primitive: resistor
        value_ohm: 1000
    R27:
      model: generic.analog.resistor
      pins:
        A: boot0
        B: gnd
      spice:
        primitive: resistor
        value_ohm: 1000
    R8:
      model: generic.analog.resistor
      pins:
        A: nrst
        B: vdd_3v3
      spice:
        primitive: resistor
        value_ohm: 10000
    D13:
      model: generic.analog.switching_diode
      pins:
        A: nrst
        K: q2_collector
    Q2:
      model: vendor.onsemi.ss8050
      part_number: SS8050
      pins:
        C: q2_collector
        B: q2_base
        E: gnd
    Q3:
      model: vendor.onsemi.ss8550
      part_number: SS8550
      pins:
        C: boot0
        B: q3_base
        E: vdd_3v3
    CBOOT:
      model: generic.analog.capacitor
      pins:
        A: boot0
        B: gnd
      spice:
        primitive: capacitor
        value_f: 0.00000000002
    CNRST:
      model: generic.analog.capacitor
      pins:
        A: nrst
        B: gnd
      spice:
        primitive: capacitor
        value_f: 0.00000000005
  nets:
    vdd_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog
    boot0:
      kind: digital_or_analog
    ch340_dtr_n:
      kind: digital_or_analog
    ch340_rts_n:
      kind: digital_or_analog
    q2_collector:
      kind: digital_or_analog
    q2_base:
      kind: digital_or_analog
    q3_base:
      kind: digital_or_analog

scenarios:
  - name: q2_q3_downloader_release_transient
    type: analog_transient
    checks:
      - SPICE_TRANSIENT_ANALYSIS
    analog:
      backend: auto
      netlist_source: generated_from_board
      generated:
        ground_net: gnd
        components:
          - VVDD
          - VDTR
          - VRTS
          - R1
          - R26
          - R27
          - R8
          - D13
          - Q2
          - Q3
          - CBOOT
          - CNRST
      model_files:
        - path: ../../models/spice/generic/switching_diode.lib
          sha256: fc342b911921bd850bb110203d87646333e58d573f73b3b5e9b1e7082fa78193
        - path: ../../models/spice/onsemi/ss8050_ss8550.lib
          sha256: 8360ca1f35758e36a5a8dd5ea3cc41ea68f608ac8c000d048e15232565b12145
      node_bindings:
        - node: vdd
          net: vdd_3v3
        - node: "0"
          net: gnd
        - node: nrst
          net: nrst
        - node: boot0
          net: boot0
        - node: dtr
          net: ch340_dtr_n
        - node: rts
          net: ch340_rts_n
        - node: q2c
          net: q2_collector
        - node: q2b
          net: q2_base
        - node: q3b
          net: q3_base
      pin_bindings:
        - node: vdd
          endpoint:
            component: U1
            pin: VDD
        - node: "0"
          endpoint:
            component: U1
            pin: VSS
        - node: nrst
          endpoint:
            component: U1
            pin: NRST
        - node: boot0
          endpoint:
            component: U1
            pin: BOOT0
        - node: dtr
          endpoint:
            component: U5
            pin: DTR_N
        - node: rts
          endpoint:
            component: U5
            pin: RTS_N
        - node: q2c
          endpoint:
            component: Q2
            pin: C
        - node: q2b
          endpoint:
            component: Q2
            pin: B
        - node: "0"
          endpoint:
            component: Q2
            pin: E
        - node: boot0
          endpoint:
            component: Q3
            pin: C
        - node: q3b
          endpoint:
            component: Q3
            pin: B
        - node: vdd
          endpoint:
            component: Q3
            pin: E
      analysis:
        type: tran
        stop_time_us: 8000
        max_step_us: 1
      stimuli:
        - name: host_control_release
          description: >
            DTR_N releases at 4.9 ms and RTS_N releases at 5.0 ms in the SPICE
            deck, matching the intended automated downloader app-boot release
            sequence.
      probes:
        - name: boot0
          expression: V(boot0)
        - name: nrst
          expression: V(nrst)
        - name: q2_collector
          expression: V(q2c)
        - name: q2_base
          expression: V(q2b)
      assertions:
        - name: boot0_low_before_app_sample
          probe: boot0
          at_us: 5100
          relation: below
          threshold_v: 0.99
        - name: nrst_released_before_app_sample
          probe: nrst
          at_us: 5100
          relation: above
          threshold_v: 2.31
        - name: q2_collector_released_before_app_sample
          probe: q2_collector
          at_us: 5100
          relation: above
          threshold_v: 2.31
        - name: q2_base_not_forward_biased_after_release
          probe: q2_base
          at_us: 5100
          relation: below
          threshold_v: 0.3
