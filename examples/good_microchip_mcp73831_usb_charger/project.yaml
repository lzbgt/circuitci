project:
  name: good_microchip_mcp73831_usb_charger
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ../../libs/vendor

board:
  components:
    VBUS:
      model: generic.analog.dc_voltage_source
      part_number: USB_5V_SOURCE
      pins:
        P: usb_5v
        N: gnd
    UCHG:
      model: vendor.microchip.mcp73831_4v2
      part_number: MCP73831T-2ACI/OT
      parameters:
        programmed_charge_current_A: 0.1
      power_domains:
        VDD: usb_5v
        VBAT: battery
      pins:
        VDD: usb_5v
        VBAT: battery
        VSS: gnd
        PROG: prog
        STAT: charge_stat
  nets:
    usb_5v:
      kind: power
      nominal_voltage: 5.0
      powered: true
      supply_current_limit_A: 0.5
    battery:
      kind: power
      nominal_voltage: 4.2
      powered: true
    prog:
      kind: digital_or_analog
    charge_stat:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios:
  - name: usb_charge_current_budget
    type: power_tree
    checks:
      - POWER_TREE_VALID
