project:
  name: good_solder_mask_dam
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets: {}
  layout:
    solder_mask:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Mask
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D11
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
        - at: { x_mm: 11.3, y_mm: 10.0 }
          layer: F.Mask
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 1
          aperture: D11
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
scenarios:
  - name: solder_mask_dam
    type: manufacturing
    checks:
      - SOLDER_MASK_DAM_VALID
    parameters:
      min_solder_mask_dam_mm: 0.15
