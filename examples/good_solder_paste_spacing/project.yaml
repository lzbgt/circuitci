project:
  name: good_solder_paste_spacing
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets: {}
  layout:
    solder_paste:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Paste
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: rect
          size: { x_mm: 0.4, y_mm: 0.4 }
        - at: { x_mm: 10.7, y_mm: 10.0 }
          layer: F.Paste
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 1
          aperture: D10
          shape: rect
          size: { x_mm: 0.4, y_mm: 0.4 }
scenarios:
  - name: solder_paste_spacing
    type: manufacturing
    checks:
      - SOLDER_PASTE_SPACING_VALID
    parameters:
      min_solder_paste_spacing_mm: 0.15
