libraries:
  - ../../libs/vendor/nexperia/protection
components:
  UESD:
    model: vendor.nexperia.prtr5v0u2x
    part_number: PRTR5V0U2X
    pin_map:
      "1": GND
      "2": IO1
      "3": IO2
      "4": VCC
nets:
  USB_DP:
    kind: digital_or_analog
    nominal_voltage: 3.3
  USB_DM:
    kind: digital_or_analog
    nominal_voltage: 3.3
  USB_VBUS:
    kind: power
    nominal_voltage: 5.0
    powered: true
  GND:
    kind: ground
