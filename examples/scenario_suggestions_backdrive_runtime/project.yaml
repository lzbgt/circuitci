project:
  name: scenario_suggestions_backdrive_runtime
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: mcu_3v3
      pins:
        VDD: mcu_3v3
        GND: gnd
        RX: uart_rx
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: usb_uart_3v3
      pins:
        VCC: usb_uart_3v3
        GND: gnd
        TXD: uart_rx
        RXD: uart_tx
  nets:
    mcu_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: false
    usb_uart_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    uart_rx:
      kind: digital_or_analog
    uart_tx:
      kind: digital_or_analog
  runtime:
    gpio_backdrive:
      - driver:
          component: U2
          pin: TXD
        victim:
          component: U1
          pin: RX
        driver_state: high
        victim_mode: input
        series_resistance_ohm: 1000
        source: hot_plug_idle_state_review

scenarios: []
