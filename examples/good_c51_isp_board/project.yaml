project:
  name: good_c51_isp_board
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.c51_isp.basic
      part_number: GENERIC_C51_ISP
      power_domains:
        VCC: c51_3v3
      pins:
        VCC: c51_3v3
        GND: gnd
        RST: c51_rst
        ISP_EN: isp_en
        P3_0: uart_c51_rx
        P3_1: uart_c51_tx
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: usb_uart_3v3
      pins:
        VCC: usb_uart_3v3
        GND: gnd
        TXD: uart_c51_rx
        RXD: uart_c51_tx
  nets:
    c51_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    usb_uart_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    c51_rst:
      kind: digital_or_analog
    isp_en:
      kind: digital_or_analog
    uart_c51_rx:
      kind: digital_or_analog
    uart_c51_tx:
      kind: digital_or_analog

scenarios:
  - name: c51_reset_to_isp
    type: reset_boot
    target:
      component: U1
      power_pin: VCC
      reset_pin: RST
    checks:
      - RESET_RELEASE_AFTER_POWER_VALID
      - BOOT_STRAP_DEFINED
    timing:
      power_valid_at_us: 1000
      reset_release_at_us: 3000
      boot_sample_at_us: 3200
    required_boot_mode: serial_isp
    straps:
      - component: U1
        pin: ISP_EN
        net: isp_en
        actual: low
  - name: c51_uart_isp_sync
    type: serial_programming
    target:
      component: U1
    checks:
      - UART_BOOTLOADER_SYNC
    required_boot_mode: serial_isp
    timing:
      power_valid_at_us: 1000
      reset_release_at_us: 3000
      boot_sample_at_us: 3200
    bootloader:
      component: U1
      interface: uart
      sync_byte: 127
      expected_response: 6
    straps:
      - component: U1
        pin: ISP_EN
        net: isp_en
        actual: low
    events:
      - at_us: 5000
        action: uart_send
        from:
          component: U2
          pin: TXD
        to:
          component: U1
          pin: P3_0
        bytes: [127]

