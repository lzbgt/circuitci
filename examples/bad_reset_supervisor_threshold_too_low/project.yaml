project:
  name: bad_reset_supervisor_threshold_too_low
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
        NRST: nrst
    USUP_LOW_THRESHOLD:
      model: generic.analog.reset_supervisor_low_threshold
      part_number: GENERIC_RESET_SUPERVISOR_2V4
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
        RESET: nrst
  nets:
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1500
    nrst:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios:
  - name: reset_supervisor_threshold_too_low
    type: power_tree
    checks:
      - POWER_TREE_VALID
