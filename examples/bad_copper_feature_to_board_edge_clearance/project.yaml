project:
  name: bad_copper_feature_to_board_edge_clearance
  version: 0.1.0

libraries: []

board:
  components: {}
  nets: {}
  layout:
    outline:
      segments:
        - start: { x_mm: 0.0, y_mm: 0.0 }
          end: { x_mm: 10.0, y_mm: 0.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 0
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
        - start: { x_mm: 10.0, y_mm: 0.0 }
          end: { x_mm: 10.0, y_mm: -10.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 1
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
        - start: { x_mm: 10.0, y_mm: -10.0 }
          end: { x_mm: 0.0, y_mm: -10.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 2
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
        - start: { x_mm: 0.0, y_mm: -10.0 }
          end: { x_mm: 0.0, y_mm: 0.0 }
          layer: BoardOutlineLayer
          source_primitive: gerber_linear
          source_primitive_index: 3
          sample_index: 0
          sample_count: 1
          contour_index: 0
          boundary_role: external
    copper:
      features:
        - at: { x_mm: 0.4, y_mm: -2.0 }
          layer: F.Cu
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: circle
          size: { x_mm: 0.6, y_mm: 0.6 }

scenarios:
  - name: copper_to_board_edge_clearance
    type: manufacturing
    checks:
      - COPPER_TO_BOARD_EDGE_CLEARANCE_VALID
    parameters:
      min_copper_edge_clearance_mm: 0.25
