project:
  name: good_ams1117_3v3_regulator
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ../../libs/vendor

board:
  components:
    VUSB:
      model: generic.analog.dc_voltage_source
      part_number: USB_5V_SOURCE
      pins:
        P: usb_5v
        N: gnd
    UREG:
      model: vendor.ams.ams1117_3v3
      part_number: AMS1117-3.3
      power_domains:
        VIN: usb_5v
        VOUT: rail_3v3
      pins:
        VIN: usb_5v
        VOUT: rail_3v3
        GND: gnd
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
    COUT:
      model: generic.analog.capacitor
      part_number: 22uF
      pins:
        A: rail_3v3
        B: gnd
      spice:
        primitive: capacitor
        value_f: 0.000022
  nets:
    usb_5v:
      kind: power
      nominal_voltage: 5.0
      powered: true
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground

scenarios:
  - name: ams1117_3v3_power_tree
    type: power_tree
    checks:
      - POWER_TREE_VALID
