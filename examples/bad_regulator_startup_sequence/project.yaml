project:
  name: bad_regulator_startup_sequence
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    V1:
      model: generic.analog.dc_voltage_source
      part_number: USB_5V_SOURCE
      pins:
        P: usb_5v
        N: gnd
    UREG:
      model: generic.analog.ldo_regulator
      part_number: GENERIC_LDO
      power_domains:
        VIN: usb_5v
        VOUT: rail_3v3
      pins:
        VIN: usb_5v
        VOUT: rail_3v3
        GND: gnd
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
  nets:
    usb_5v:
      kind: power
      nominal_voltage: 5.0
      powered: true
      power_valid_at_us: 800
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1200
    gnd:
      kind: ground

scenarios:
  - name: regulator_startup_sequence
    type: power_tree
    checks:
      - POWER_TREE_VALID
