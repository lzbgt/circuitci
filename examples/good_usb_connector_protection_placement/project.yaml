project:
  name: good_usb_connector_protection_placement
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    J1:
      model: generic.connector.usb2
      part_number: USB2_CONNECTOR
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
    UESD:
      model: generic.protection.usb_esd_basic
      pins:
        DP: usb_dp
        DM: usb_dm
        GND: gnd
    UVBUS:
      model: generic.protection.vbus_esd_basic
      pins:
        VBUS: usb_vbus
        GND: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
  layout:
    placements:
      J1:
        x_mm: 0.0
        y_mm: 0.0
        side: top
      UESD:
        x_mm: 1.0
        y_mm: 0.0
        side: top
      UVBUS:
        x_mm: 1.5
        y_mm: 0.0
        side: top

scenarios:
  - name: usb_connector_protection_placement
    type: interface_protection
    checks:
      - USB_PROTECTION_PLACEMENT_VALID
    target:
      component: J1
    parameters:
      require_vbus_protection: true
      max_connector_to_protection_distance_mm: 2.0
