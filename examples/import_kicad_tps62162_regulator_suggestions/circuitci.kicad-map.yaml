libraries:
  - ../../libs/generic
  - ../../libs/vendor
components:
  UBUCK:
    model: vendor.ti.tps62162_3v3
    part_number: TPS62162DSG
    pin_map:
      "1": VIN
      "2": GND
      "3": EN
      "4": PG
      "5": VOS
      "7": SW
  U1:
    model: generic.mcu.basic
    pin_map:
      "1": VDD
      "2": GND
  CIN:
    model: generic.analog.capacitor
    pin_map:
      "1": A
      "2": B
    spice:
      primitive: capacitor
      value_f_from: schematic_value
  COUT:
    model: generic.analog.capacitor
    pin_map:
      "1": A
      "2": B
    spice:
      primitive: capacitor
      value_f_from: schematic_value
  L1:
    model: generic.analog.inductor
    pin_map:
      "1": A
      "2": B
    spice:
      primitive: inductor
      value_h_from: schematic_value
nets:
  RAIL_12V:
    kind: power
    nominal_voltage: 12.0
    powered: true
    power_valid_at_us: 0
  RAIL_3V3:
    kind: power
    nominal_voltage: 3.3
    powered: true
    power_valid_at_us: 1000
  GND:
    kind: ground
