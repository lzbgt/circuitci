project:
  name: import_gerber_solder_paste_openings
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets:
    GND:
      kind: ground
  layout:
    pads:
      U1:
        "1":
          at: { x_mm: 10.0, y_mm: 10.0 }
          net: GND
          layers: [F.Cu]
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
    copper:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Cu
          polarity: dark
          net: GND
          owner_kind: pad
          component: U1
          pin: "1"
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
scenarios:
  - name: solder_paste_opening
    type: manufacturing
    checks:
      - SOLDER_PASTE_OPENING_VALID
    parameters:
      min_paste_area_ratio: 0.7
      max_paste_area_ratio: 1.0
      max_copper_to_paste_center_offset_mm: 0.05
