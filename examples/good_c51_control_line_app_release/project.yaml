project:
  name: good_c51_control_line_app_release
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.c51_isp.basic
      part_number: GENERIC_C51
      power_domains:
        VCC: mcu_3v3
      pins:
        VCC: mcu_3v3
        GND: gnd
        RST: reset_in
        ISP_EN: mode_select
        P3_0: uart_rx
        P3_1: uart_tx
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: adapter_3v3
      pins:
        VCC: adapter_3v3
        GND: gnd
        TXD: ctrl_a
        RXD: ctrl_b
    U3:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: adapter_3v3
      pins:
        VCC: adapter_3v3
        GND: gnd
        TXD: ctrl_b
  nets:
    mcu_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    adapter_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    reset_in:
      kind: digital_or_analog
    mode_select:
      kind: digital_or_analog
    uart_rx:
      kind: digital_or_analog
    uart_tx:
      kind: digital_or_analog
    ctrl_a:
      kind: digital_or_analog
    ctrl_b:
      kind: digital_or_analog

scenarios:
  - name: generic_control_lines_release_to_application
    type: control_line_sequence
    target:
      component: U1
      power_pin: VCC
      reset_pin: RST
    checks:
      - CONTROL_LINE_RELEASE_SEQUENCE
    required_boot_mode: application
    timing:
      power_valid_at_us: 1000
      reset_release_at_us: 3000
      boot_sample_at_us: 3200
    control_effects:
      - name: mode_line
        source:
          component: U2
          pin: TXD
        target:
          component: U1
          pin: ISP_EN
        asserted_state: low
        released_state: high
        release_delay_us: 20
      - name: reset_line
        source:
          component: U3
          pin: TXD
        target:
          component: U1
          pin: RST
        asserted_state: high
        released_state: low
        release_delay_us: 0
    events:
      - at_us: 0
        action: control_line
        line: mode_line
        asserted: true
      - at_us: 500
        action: control_line
        line: reset_line
        asserted: true
      - at_us: 2900
        action: control_line
        line: mode_line
        asserted: false
      - at_us: 3000
        action: control_line
        line: reset_line
        asserted: false
