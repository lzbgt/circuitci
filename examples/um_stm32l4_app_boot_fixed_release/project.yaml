project:
  name: um_stm32l4_app_boot_fixed_release
  version: 0.1.0

libraries:
  - ../../libs/vendor/st
  - ../../libs/vendor/wch

board:
  components:
    U1:
      model: vendor.st.stm32l431vct6
      part_number: STM32L431VCT6
      power_domains:
        VDD: vdd_3v3
      pins:
        VDD: vdd_3v3
        VSS: gnd
        NRST: nrst
        BOOT0: boot0
        PA9: usart1_tx
        PA10: usart1_rx
    U5:
      model: vendor.wch.ch340c
      part_number: CH340C
      power_domains:
        VCC: vdd_3v3
      pins:
        VCC: vdd_3v3
        GND: gnd
        TXD: usart1_rx
        RXD: usart1_tx
        DTR_N: ch340_dtr_n
        RTS_N: ch340_rts_n
  nets:
    vdd_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog
    boot0:
      kind: digital_or_analog
    usart1_tx:
      kind: digital_or_analog
    usart1_rx:
      kind: digital_or_analog
    ch340_dtr_n:
      kind: digital_or_analog
    ch340_rts_n:
      kind: digital_or_analog

scenarios:
  - name: reset_release_samples_boot0_low
    type: reset_boot
    target:
      component: U1
      power_pin: VDD
      reset_pin: NRST
    checks:
      - RESET_RELEASE_AFTER_POWER_VALID
      - BOOT_STRAP_DEFINED
    timing:
      power_valid_at_us: 1200
      reset_release_at_us: 5000
      boot_sample_at_us: 5100
    required_boot_mode: application
    straps:
      - component: U1
        pin: BOOT0
        net: boot0
        actual: low
