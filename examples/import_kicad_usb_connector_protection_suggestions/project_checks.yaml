project:
  name: import_kicad_usb_connector_protection_checks
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ../../libs/vendor/ti/protection

board:
  components:
    J1:
      model: generic.connector.usb2
      part_number: USB2_CONNECTOR
      pins:
        VBUS: net_usb_vbus
        "D+": net_usb_dp
        "D-": net_usb_dm
        GND: gnd
        SHIELD: gnd
    UESD:
      model: vendor.ti.tpd2eusb30
      part_number: TPD2EUSB30
      pins:
        "D1+": net_usb_dp
        "D1-": net_usb_dm
        GND: gnd
    UVBUS:
      model: generic.protection.vbus_esd_basic
      part_number: VBUS_ESD
      pins:
        VBUS: net_usb_vbus
        GND: gnd
  nets:
    net_usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    net_usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    net_usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
  layout:
    footprints:
      J1:
        entry_direction:
          offset_deg: 0.0
          source: kicad_mapping
        entry_clearance:
          depth_mm: 2.0
          width_mm: 1.3
          source: kicad_mapping
        entry_aperture:
          front_offset_mm: 0.0
          lateral_offset_mm: 0.0
          width_mm: 1.2
          source: kicad_mapping
    constraints:
      usb_connector:
        max_connector_to_protection_distance_mm: 2.0
        max_connector_rotation_error_deg: 181.0
        max_connector_to_board_edge_distance_mm: 0.1
        max_connector_body_overhang_mm: 0.5
        min_connector_to_component_clearance_mm: 0.5
        source: fixture_usb_connector_layout_rule
      usb_return_path:
        max_data_line_unreferenced_length_mm: 0.0
        source: fixture_usb_return_path_rule

scenarios:
  - name: usb_protection_placement_from_board_constraints
    type: interface_protection
    checks:
      - USB_PROTECTION_PLACEMENT_VALID
    target:
      component: J1
    parameters:
      require_vbus_protection: true
  - name: usb_connector_orientation_from_board_constraints
    type: interface_protection
    checks:
      - USB_CONNECTOR_ORIENTATION_VALID
    target:
      component: J1
    parameters:
      expected_connector_rotation_deg: 180.0
  - name: usb_connector_edge_proximity_from_board_constraints
    type: interface_protection
    checks:
      - USB_CONNECTOR_EDGE_PROXIMITY_VALID
    target:
      component: J1
  - name: usb_connector_body_overhang_from_board_constraints
    type: interface_protection
    checks:
      - USB_CONNECTOR_BODY_OVERHANG_VALID
    target:
      component: J1
  - name: usb_connector_component_clearance_from_board_constraints
    type: interface_protection
    checks:
      - USB_CONNECTOR_COMPONENT_CLEARANCE_VALID
    target:
      component: J1
  - name: usb_connector_component_clearance_from_imported_pcb
    type: interface_protection
    checks:
      - USB_CONNECTOR_COMPONENT_CLEARANCE_VALID
    target:
      component: J1
    parameters:
      min_connector_to_component_clearance_mm: 0.7
  - name: usb_connector_entry_clearance_from_imported_pcb
    type: interface_protection
    checks:
      - USB_CONNECTOR_ENTRY_CLEARANCE_VALID
    target:
      component: J1
    parameters:
      min_cable_entry_clearance_depth_mm: 0.8
      cable_entry_clearance_width_mm: 1.0
