project:
  name: bad_diode_missing_derating
  version: 0.1.0

libraries:
  - ../../libs/generic/analog
  - ../../libs/vendor/onsemi/diodes

board:
  components:
    VIN:
      model: generic.analog.pulse_voltage_source
      pins:
        P: in_net
        N: gnd
      spice:
        primitive: pulse_voltage_source
        pulse:
          initial_v: 0
          pulsed_v: 3.3
          delay_us: 10
          rise_us: 0.1
          fall_us: 0.1
          width_us: 80
          period_us: 200
    RLOAD:
      model: generic.analog.resistor
      pins:
        A: out_net
        B: gnd
      spice:
        primitive: resistor
        value_ohm: 1000
    D1:
      model: vendor.onsemi.1n4148ws
      part_number: 1N4148WS
      pins:
        A: in_net
        K: out_net
  nets:
    in_net:
      kind: digital_or_analog
    out_net:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios:
  - name: diode_temperature_derating_requires_metadata
    type: analog_transient
    checks:
      - SPICE_TRANSIENT_ANALYSIS
    analog:
      backend: auto
      netlist_source: generated_from_board
      generated:
        ground_net: gnd
        components:
          - VIN
          - D1
          - RLOAD
      operating_conditions:
        ambient_temperature_c: 100
      model_files:
        - path: ../../models/spice/onsemi/1n4148ws.lib
          sha256: dee84e9189e05a9af600a0224a63cb6d01ebec4df27ff4ed12baeddd34869504
      node_bindings:
        - node: in
          net: in_net
        - node: out
          net: out_net
        - node: "0"
          net: gnd
      pin_bindings:
        - node: in
          endpoint:
            component: D1
            pin: A
        - node: out
          endpoint:
            component: D1
            pin: K
        - node: "0"
          endpoint:
            component: RLOAD
            pin: B
      analysis:
        type: tran
        stop_time_us: 120
        max_step_us: 0.1
      stimuli:
        - name: diode_forward_pulse
          description: A low-current diode pulse requests temperature derating, but the model lacks PD derating metadata.
      probes:
        - name: out
          expression: V(out)
      assertions:
        - name: output_rises
          probe: out
          at_us: 30
          relation: above
          threshold_v: 2
