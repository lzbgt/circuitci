project:
  name: scenario_suggestions_reset_rc
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
        NRST: nrst
    R1:
      model: generic.analog.resistor
      part_number: 10K
      pins:
        A: rail_3v3
        B: nrst
      spice:
        primitive: resistor
        value_ohm: 10000
    C1:
      model: generic.analog.capacitor
      part_number: 100NF
      pins:
        A: nrst
        B: gnd
      spice:
        primitive: capacitor
        value_f: 0.0000001
  nets:
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1500
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog

scenarios: []
