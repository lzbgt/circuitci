project:
  name: good_bootloader_board
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: mcu_3v3
      pins:
        VDD: mcu_3v3
        GND: gnd
        NRST: nrst
        BOOT0: boot0
        RX: uart_mcu_rx
        TX: uart_mcu_tx
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: usb_uart_3v3
      pins:
        VCC: usb_uart_3v3
        GND: gnd
        TXD: uart_mcu_rx
        RXD: uart_mcu_tx
  nets:
    mcu_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1200
    usb_uart_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog
    boot0:
      kind: digital_or_analog
    uart_mcu_rx:
      kind: digital_or_analog
    uart_mcu_tx:
      kind: digital_or_analog

scenarios:
  - name: reset_boot_to_bootloader
    type: reset_boot
    target:
      component: U1
      power_pin: VDD
      reset_pin: NRST
    checks:
      - RESET_RELEASE_AFTER_POWER_VALID
      - BOOT_STRAP_DEFINED
    timing:
      power_valid_at_us: 1200
      reset_release_at_us: 5000
      boot_sample_at_us: 5100
    required_boot_mode: bootloader
    straps:
      - component: U1
        pin: BOOT0
        net: boot0
        actual: high
  - name: uart_bootloader_sync
    type: serial_programming
    target:
      component: U1
    checks:
      - UART_BOOTLOADER_SYNC
    required_boot_mode: bootloader
    timing:
      power_valid_at_us: 1200
      reset_release_at_us: 5000
      boot_sample_at_us: 5100
    bootloader:
      component: U1
      interface: uart
      sync_byte: 127
      expected_response: 121
    straps:
      - component: U1
        pin: BOOT0
        net: boot0
        actual: high
    events:
      - at_us: 10000
        action: uart_send
        from:
          component: U2
          pin: TXD
        to:
          component: U1
          pin: RX
        bytes: [127]
