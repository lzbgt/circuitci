libraries:
  - ../../libs/vendor/ti/protection
components:
  UESD:
    model: vendor.ti.tpd2eusb30
    part_number: TPD2EUSB30
    pin_map:
      "1": "D1+"
      "2": "D1-"
      "3": GND
nets:
  USB_DP:
    kind: digital_or_analog
    nominal_voltage: 3.3
  USB_DM:
    kind: digital_or_analog
    nominal_voltage: 3.3
  GND:
    kind: ground
