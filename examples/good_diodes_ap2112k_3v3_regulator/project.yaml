project:
  name: good_diodes_ap2112k_3v3_regulator
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ../../libs/vendor

board:
  components:
    VUSB:
      model: generic.analog.dc_voltage_source
      part_number: USB_5V_SOURCE
      pins:
        P: usb_5v
        N: gnd
    UREG:
      model: vendor.diodes.ap2112k_3v3
      part_number: AP2112K-3.3TRG1
      power_domains:
        VIN: usb_5v
        VOUT: rail_3v3
      pins:
        VIN: usb_5v
        VOUT: rail_3v3
        GND: gnd
        EN: regulator_en
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: rail_3v3
      pins:
        VCC: rail_3v3
        GND: gnd
  nets:
    usb_5v:
      kind: power
      nominal_voltage: 5.0
      powered: true
      power_valid_at_us: 0
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1500
    regulator_en:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios:
  - name: ap2112k_3v3_power_tree
    type: power_tree
    checks:
      - POWER_TREE_VALID
