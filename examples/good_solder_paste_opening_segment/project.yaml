project:
  name: good_solder_paste_opening_segment
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets: {}
  layout:
    copper:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Cu
          polarity: dark
          owner_kind: pad
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.2 }
    solder_paste:
      segments:
        - start: { x_mm: 9.6, y_mm: 10.0 }
          end: { x_mm: 10.4, y_mm: 10.0 }
          layer: F.Paste
          polarity: dark
          source_primitive: gerber_linear_draw
          source_primitive_index: 0
          aperture: D11
          width_mm: 0.2
scenarios:
  - name: solder_paste_opening
    type: manufacturing
    checks:
      - SOLDER_PASTE_OPENING_VALID
    parameters:
      min_paste_area_ratio: 0.7
      max_paste_area_ratio: 1.0
      max_copper_to_paste_center_offset_mm: 0.05
