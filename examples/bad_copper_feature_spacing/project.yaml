project:
  name: bad_copper_feature_spacing
  version: 0.1.0

libraries: []

board:
  components: {}
  nets: {}
  layout:
    copper:
      features:
        - at: { x_mm: 1.0, y_mm: 1.0 }
          layer: F.Cu
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: circle
          size: { x_mm: 0.8, y_mm: 0.8 }
        - at: { x_mm: 2.0, y_mm: 1.0 }
          layer: F.Cu
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 1
          aperture: D11
          shape: circle
          size: { x_mm: 0.8, y_mm: 0.8 }

scenarios:
  - name: copper_spacing
    type: manufacturing
    checks:
      - COPPER_SPACING_VALID
    parameters:
      min_copper_spacing_mm: 0.25
