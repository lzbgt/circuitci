project:
  name: bad_usb_connector_shield_not_ground
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    J1:
      model: generic.connector.usb2
      part_number: USB2_CONNECTOR
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
        SHIELD: usb_shield
    UESD:
      model: generic.protection.usb_esd_basic
      pins:
        DP: usb_dp
        DM: usb_dm
        GND: gnd
    UVBUS:
      model: generic.protection.vbus_esd_basic
      pins:
        VBUS: usb_vbus
        GND: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
    usb_shield:
      kind: digital_or_analog

scenarios:
  - name: usb_connector_protection
    type: interface_protection
    checks:
      - USB_CONNECTOR_PROTECTION_VALID
    target:
      component: J1
    parameters:
      require_vbus_protection: true
      require_shield_ground: true
      data_working_voltage_min_V: 3.3
      vbus_working_voltage_min_V: 5.0
