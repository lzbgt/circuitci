project:
  name: bad_solder_mask_dam_segment_region
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets:
    GND:
      kind: ground
  layout:
    solder_mask:
      segments:
        - start: { x_mm: 1.0, y_mm: 1.0 }
          end: { x_mm: 2.0, y_mm: 1.0 }
          layer: F.Mask
          polarity: dark
          net: GND
          owner_kind: pad
          component: U1
          pin: "1"
          source_primitive: gerber_linear_draw
          source_primitive_index: 0
          aperture: D11
          width_mm: 0.2
      regions:
        - points:
            - { x_mm: 1.0, y_mm: 1.22 }
            - { x_mm: 2.0, y_mm: 1.22 }
            - { x_mm: 2.0, y_mm: 1.8 }
            - { x_mm: 1.0, y_mm: 1.8 }
          layer: F.Mask
          polarity: dark
          net: GND
          owner_kind: pad
          component: U1
          pin: "2"
          source_primitive: gerber_region
          source_primitive_index: 1
scenarios:
  - name: solder_mask_dam
    type: manufacturing
    checks:
      - SOLDER_MASK_DAM_VALID
    parameters:
      min_solder_mask_dam_mm: 0.15
