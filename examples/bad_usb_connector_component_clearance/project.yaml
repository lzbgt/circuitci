project:
  name: bad_usb_connector_component_clearance
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    J1:
      model: generic.connector.usb2
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
    R1:
      model: generic.analog.resistor
      pins:
        A: usb_dp
        B: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
  layout:
    footprints:
      J1:
        polygons:
          - points:
              - { x_mm: -0.5, y_mm: -0.5 }
              - { x_mm: 0.5, y_mm: -0.5 }
              - { x_mm: 0.5, y_mm: 0.5 }
              - { x_mm: -0.5, y_mm: 0.5 }
            layer: F.CrtYd
            kind: courtyard
      R1:
        rectangles:
          - start: { x_mm: 0.8, y_mm: -0.25 }
            end: { x_mm: 1.3, y_mm: 0.25 }
            layer: F.CrtYd
            kind: courtyard

scenarios:
  - name: usb_connector_bad_component_clearance
    type: interface_protection
    checks:
      - USB_CONNECTOR_COMPONENT_CLEARANCE_VALID
    target:
      component: J1
    parameters:
      min_connector_to_component_clearance_mm: 0.5
