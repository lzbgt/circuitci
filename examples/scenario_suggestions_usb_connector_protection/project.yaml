project:
  name: scenario_suggestions_usb_connector_protection
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ../../libs/vendor/ti/protection

board:
  components:
    J1:
      model: generic.connector.usb2
      part_number: USB2_CONNECTOR
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
        SHIELD: gnd
    UESD:
      model: vendor.ti.tpd2eusb30
      part_number: TPD2EUSB30
      pins:
        "D1+": usb_dp
        "D1-": usb_dm
        GND: gnd
    UVBUS:
      model: generic.protection.vbus_esd_basic
      pins:
        VBUS: usb_vbus
        GND: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
  layout:
    placements:
      J1:
        x_mm: 0.0
        y_mm: 0.0
        side: top
        rotation_deg: 0.0
      UESD:
        x_mm: 1.0
        y_mm: 0.0
        side: top
      UVBUS:
        x_mm: 1.5
        y_mm: 0.0
        side: top
    routes:
      usb_dp:
        segments:
          - start: { x_mm: 0.0, y_mm: 0.0 }
            end: { x_mm: 1.0, y_mm: 0.0 }
            width_mm: 0.15
            layer: F.Cu
      usb_dm:
        segments:
          - start: { x_mm: 0.0, y_mm: 0.4 }
            end: { x_mm: 1.0, y_mm: 0.4 }
            width_mm: 0.15
            layer: F.Cu
        vias:
          - at: { x_mm: 0.5, y_mm: 0.4 }
            size_mm: 0.6
            drill_mm: 0.3
            layers: [F.Cu, B.Cu]
      usb_vbus:
        segments:
          - start: { x_mm: 0.0, y_mm: 0.0 }
            end: { x_mm: 1.5, y_mm: 0.0 }
            width_mm: 0.30
            layer: F.Cu
    constraints:
      usb_connector:
        max_connector_to_protection_distance_mm: 2.0
        max_connector_rotation_error_deg: 181.0
        max_connector_to_board_edge_distance_mm: 0.1
        max_connector_body_overhang_mm: 0.5
        min_connector_to_component_clearance_mm: 0.5
        source: fixture_usb_connector_layout_rule
      usb_route:
        max_data_line_via_count: 1
        max_data_line_width_delta_mm: 0.02
        max_connector_to_protection_route_distance_mm: 2.0
        max_component_to_route_distance_mm: 0.05
        max_data_pair_via_count_delta: 1
        max_data_pair_gap_delta_mm: 0.12
        require_route_pad_contact_evidence: true
        source: fixture_usb_route_layout_rule
      usb_vbus_route:
        max_vbus_via_count: 0
        min_vbus_route_width_mm: 0.25
        max_connector_to_vbus_protection_route_distance_mm: 2.0
        max_component_to_route_distance_mm: 0.05
        require_vbus_route_pad_contact_evidence: true
        source: fixture_usb_vbus_route_layout_rule
      usb_return_path:
        max_data_line_unreferenced_length_mm: 0.0
        source: fixture_usb_return_path_rule
      net_rules:
        usb_vbus:
          net_class: USB_POWER
          track_width_mm: 0.30
          length_max_mm: 20.0

scenarios: []
