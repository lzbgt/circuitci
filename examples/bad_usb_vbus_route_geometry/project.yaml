project:
  name: bad_usb_vbus_route_geometry
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    J1:
      model: generic.connector.usb2
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
    UVBUS:
      model: generic.protection.vbus_esd_basic
      pins:
        VBUS: usb_vbus
        GND: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground
  layout:
    placements:
      J1:
        x_mm: 0.0
        y_mm: 0.0
        side: top
      UVBUS:
        x_mm: 6.0
        y_mm: 0.0
        side: top
    pads:
      J1:
        VBUS:
          net: usb_vbus
          at: { x_mm: 0.0, y_mm: 0.0 }
          layers: [F.Cu]
      UVBUS:
        VBUS:
          net: usb_vbus
          at: { x_mm: 6.0, y_mm: 0.0 }
          layers: [F.Cu]
    routes:
      usb_vbus:
        segments:
          - start: { x_mm: 0.0, y_mm: 0.0 }
            end: { x_mm: 6.0, y_mm: 0.0 }
            width_mm: 0.10
            layer: F.Cu
        vias:
          - at: { x_mm: 2.0, y_mm: 0.0 }
            size_mm: 0.6
            drill_mm: 0.3
            layers: [F.Cu, B.Cu]
          - at: { x_mm: 4.0, y_mm: 0.0 }
            size_mm: 0.6
            drill_mm: 0.3
            layers: [B.Cu, F.Cu]
    constraints:
      net_rules:
        usb_vbus:
          net_class: USB_POWER
          track_width_mm: 0.30
          length_max_mm: 20.0

scenarios:
  - name: usb_vbus_route_geometry_bad
    type: interface_protection
    checks:
      - USB_VBUS_ROUTE_VALID
    target:
      component: J1
    parameters:
      max_vbus_route_length_mm: 5.0
      max_vbus_via_count: 0
      min_vbus_route_width_mm: 0.25
      max_connector_to_vbus_protection_route_distance_mm: 2.0
      max_component_to_route_distance_mm: 1.0
      require_vbus_route_pad_contact_evidence: true
