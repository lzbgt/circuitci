libraries:
  - ../../libs/generic
pin_aliases:
  two_terminal_ab:
    "1": A
    "2": B
libsource_rules:
  - lib: Device
    part: R
    model: generic.analog.resistor
    pin_alias: two_terminal_ab
    spice:
      primitive: resistor
      value_ohm_from: schematic_value
  - lib: Device
    part: C
    model: generic.analog.capacitor
    pin_alias: two_terminal_ab
    spice:
      primitive: capacitor
      value_f_from: schematic_value
components:
  U1:
    model: generic.mcu.basic
    pin_map:
      "1": VDD
      "2": GND
      "3": NRST
nets:
  RAIL_3V3:
    kind: power
    nominal_voltage: 3.3
    powered: true
    power_valid_at_us: 1500
  GND:
    kind: ground
