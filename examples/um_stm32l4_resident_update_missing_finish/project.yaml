project:
  name: um_stm32l4_resident_update_missing_finish
  version: 0.1.0

libraries:
  - ../../libs/vendor/um
  - ../../libs/vendor/wch

board:
  components:
    U1:
      model: vendor.um.um_stm32l4_resident
      part_number: UM_STM32L4_RESIDENT
      power_domains:
        VDD: vdd_3v3
      pins:
        VDD: vdd_3v3
        VSS: gnd
        NRST: nrst
        BOOT0: boot0
        PA9: usart1_tx
        PA10: usart1_rx
    U5:
      model: vendor.wch.ch340c
      part_number: CH340C
      power_domains:
        VCC: vdd_3v3
      pins:
        VCC: vdd_3v3
        GND: gnd
        TXD: usart1_rx
        RXD: usart1_tx
  nets:
    vdd_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog
    boot0:
      kind: digital_or_analog
    usart1_tx:
      kind: digital_or_analog
    usart1_rx:
      kind: digital_or_analog

scenarios:
  - name: resident_upload_without_finish
    type: firmware_update
    target:
      component: U1
    checks:
      - RESIDENT_BOOTLOADER_UPDATE_SEQUENCE
    protocol:
      component: U1
      name: umbl_resident_update
      flow: upload_activate_next_log
      sender:
        component: U5
        pin: TXD
      package_size_bytes: 2048
      package_sha256: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      chunk_size_bytes: 1024
      expected_final_state: activate_pending
    events:
      - at_us: 8000
        action: protocol_request
        operation: status
        result_code: 0
        state: recovery_idle
      - at_us: 10000
        action: protocol_request
        operation: begin
        payload_len: 37
        result_code: 0
      - at_us: 12000
        action: protocol_request
        operation: data
        offset: 0
        chunk_len: 1024
        payload_len: 1030
        result_code: 0
      - at_us: 14000
        action: protocol_request
        operation: data
        offset: 1024
        chunk_len: 1024
        payload_len: 1030
        result_code: 0
      - at_us: 18000
        action: protocol_request
        operation: status
        result_code: 0
        state: staged_ready
