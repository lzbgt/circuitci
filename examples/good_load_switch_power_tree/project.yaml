project:
  name: good_load_switch_power_tree
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    V1:
      model: generic.analog.dc_voltage_source
      part_number: USB_5V_SOURCE
      pins:
        P: usb_5v
        N: gnd
    USW:
      model: generic.analog.load_switch
      part_number: GENERIC_LOAD_SWITCH
      power_domains:
        VIN: usb_5v
        VOUT: sensor_3v3
      pins:
        VIN: usb_5v
        VOUT: sensor_3v3
        EN: sensor_power_en
        GND: gnd
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: sensor_3v3
      pins:
        VDD: sensor_3v3
        GND: gnd
  nets:
    usb_5v:
      kind: power
      nominal_voltage: 5.0
      powered: true
    sensor_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    sensor_power_en:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios:
  - name: switched_sensor_rail_enabled
    type: power_tree
    checks:
      - POWER_TREE_VALID
    pin_states:
      - component: USW
        pin: EN
        mode: input
        state: high
