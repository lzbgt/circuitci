project:
  name: scenario_suggestions_tlv803_reset_release
  version: 0.1.0

libraries:
  - ../../libs/generic
  - ../../libs/vendor

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
        NRST: nrst
        BOOT0: gnd
        RX: uart_tx
    U2:
      model: generic.usb_uart.basic
      part_number: GENERIC_USB_UART
      power_domains:
        VCC: rail_3v3
      pins:
        VCC: rail_3v3
        GND: gnd
        TXD: uart_tx
    USUP:
      model: vendor.ti.tlv803ea29
      part_number: TLV803EA29DBZR
      power_domains:
        VDD: rail_3v3
      pins:
        VDD: rail_3v3
        GND: gnd
        RESET: nrst
  nets:
    rail_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1500
    nrst:
      kind: digital_or_analog
    uart_tx:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios: []
