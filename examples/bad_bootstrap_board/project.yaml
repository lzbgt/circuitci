project:
  name: bad_bootstrap_board
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: mcu_3v3
      pins:
        VDD: mcu_3v3
        GND: gnd
        NRST: nrst
        BOOT0: boot0
  nets:
    mcu_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog
    boot0:
      kind: digital_or_analog

scenarios:
  - name: bootloader_strap_wrong
    type: reset_boot
    target:
      component: U1
      power_pin: VDD
      reset_pin: NRST
    checks:
      - BOOT_STRAP_DEFINED
    timing:
      power_valid_at_us: 1200
      reset_release_at_us: 5000
      boot_sample_at_us: 5100
    required_boot_mode: bootloader
    straps:
      - component: U1
        pin: BOOT0
        net: boot0
        actual: low

