project:
  name: bad_drill_to_cutout_edge_clearance
  version: 0.1.0

libraries: []

board:
  components: {}
  nets: {}
  layout:
    outline:
      segments:
        - start: { x_mm: 0.0, y_mm: 0.0 }
          end: { x_mm: 10.0, y_mm: 0.0 }
          layer: BoardOutlineLayer
          boundary_role: external
        - start: { x_mm: 10.0, y_mm: 0.0 }
          end: { x_mm: 10.0, y_mm: -10.0 }
          layer: BoardOutlineLayer
          boundary_role: external
        - start: { x_mm: 10.0, y_mm: -10.0 }
          end: { x_mm: 0.0, y_mm: -10.0 }
          layer: BoardOutlineLayer
          boundary_role: external
        - start: { x_mm: 0.0, y_mm: -10.0 }
          end: { x_mm: 0.0, y_mm: 0.0 }
          layer: BoardOutlineLayer
          boundary_role: external
        - start: { x_mm: 4.0, y_mm: -4.0 }
          end: { x_mm: 6.0, y_mm: -4.0 }
          layer: BoardOutlineLayer
          contour_index: 1
          boundary_role: cutout
        - start: { x_mm: 6.0, y_mm: -4.0 }
          end: { x_mm: 6.0, y_mm: -6.0 }
          layer: BoardOutlineLayer
          contour_index: 1
          boundary_role: cutout
        - start: { x_mm: 6.0, y_mm: -6.0 }
          end: { x_mm: 4.0, y_mm: -6.0 }
          layer: BoardOutlineLayer
          contour_index: 1
          boundary_role: cutout
        - start: { x_mm: 4.0, y_mm: -6.0 }
          end: { x_mm: 4.0, y_mm: -4.0 }
          layer: BoardOutlineLayer
          contour_index: 1
          boundary_role: cutout
    drills:
      - at: { x_mm: 4.7, y_mm: -5.0 }
        drill_mm: 1.0
        plating: plated
        layer: PTH_Through
        tool: T02
        source_hit_index: 4

scenarios:
  - name: drill_to_cutout_edge_clearance
    type: manufacturing
    checks:
      - DRILL_TO_BOARD_EDGE_CLEARANCE_VALID
    parameters:
      min_drill_edge_clearance_mm: 0.4
