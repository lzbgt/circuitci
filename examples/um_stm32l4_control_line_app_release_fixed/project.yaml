project:
  name: um_stm32l4_control_line_app_release_fixed
  version: 0.1.0

libraries:
  - ../../libs/vendor/st
  - ../../libs/vendor/wch

board:
  components:
    U1:
      model: vendor.st.stm32l431vct6
      part_number: STM32L431VCT6
      power_domains:
        VDD: vdd_3v3
      pins:
        VDD: vdd_3v3
        VSS: gnd
        NRST: nrst
        BOOT0: boot0
    U5:
      model: vendor.wch.ch340c
      part_number: CH340C
      power_domains:
        VCC: vdd_3v3
      pins:
        VCC: vdd_3v3
        GND: gnd
        DTR_N: ch340_dtr_n
        RTS_N: ch340_rts_n
  nets:
    vdd_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog
    boot0:
      kind: digital_or_analog
    ch340_dtr_n:
      kind: digital_or_analog
    ch340_rts_n:
      kind: digital_or_analog

scenarios:
  - name: host_release_samples_boot0_low
    type: control_line_sequence
    target:
      component: U1
      power_pin: VDD
      reset_pin: NRST
    checks:
      - CONTROL_LINE_RELEASE_SEQUENCE
    required_boot_mode: application
    timing:
      power_valid_at_us: 1200
      reset_release_at_us: 5000
      boot_sample_at_us: 5100
    control_effects:
      - name: boot_select
        source:
          component: U5
          pin: DTR_N
        target:
          component: U1
          pin: BOOT0
        asserted_state: high
        released_state: low
        release_delay_us: 50
      - name: reset
        source:
          component: U5
          pin: RTS_N
        target:
          component: U1
          pin: NRST
        asserted_state: low
        released_state: high
        release_delay_us: 0
    events:
      - at_us: 0
        action: control_line
        line: boot_select
        asserted: true
      - at_us: 1000
        action: control_line
        line: reset
        asserted: true
      - at_us: 4900
        action: control_line
        line: boot_select
        asserted: false
      - at_us: 5000
        action: control_line
        line: reset
        asserted: false
