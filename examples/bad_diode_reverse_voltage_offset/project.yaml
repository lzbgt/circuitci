project:
  name: bad_diode_reverse_voltage_offset
  version: 0.1.0

libraries:
  - ../../libs/generic/analog
  - ../../libs/vendor/onsemi/diodes

board:
  components:
    VANODE:
      model: generic.analog.dc_voltage_source
      pins:
        P: anode_node
        N: gnd
      spice:
        primitive: dc_voltage_source
        dc_v: 10
    VK:
      model: generic.analog.dc_voltage_source
      pins:
        P: cathode_supply
        N: gnd
      spice:
        primitive: dc_voltage_source
        dc_v: 130
    RLEAK:
      model: generic.analog.resistor
      pins:
        A: cathode_supply
        B: cathode_node
      spice:
        primitive: resistor
        value_ohm: 1000000
    D1:
      model: vendor.onsemi.1n4148ws
      part_number: 1N4148WS
      pins:
        A: anode_node
        K: cathode_node
  nets:
    anode_node:
      kind: power
      nominal_voltage: 10
      powered: true
    cathode_supply:
      kind: power
      nominal_voltage: 130
      powered: true
    cathode_node:
      kind: digital_or_analog
    gnd:
      kind: ground

scenarios:
  - name: diode_reverse_overvoltage_offset_nodes
    type: analog_transient
    checks:
      - SPICE_TRANSIENT_ANALYSIS
    analog:
      backend: auto
      netlist_source: generated_from_board
      generated:
        ground_net: gnd
        components:
          - VANODE
          - VK
          - RLEAK
          - D1
      model_files:
        - path: ../../models/spice/onsemi/1n4148ws.lib
          sha256: dee84e9189e05a9af600a0224a63cb6d01ebec4df27ff4ed12baeddd34869504
      node_bindings:
        - node: anode
          net: anode_node
        - node: cathode_supply
          net: cathode_supply
        - node: cathode
          net: cathode_node
        - node: "0"
          net: gnd
      pin_bindings:
        - node: anode
          endpoint:
            component: D1
            pin: A
        - node: cathode
          endpoint:
            component: D1
            pin: K
        - node: cathode_supply
          endpoint:
            component: VK
            pin: P
        - node: "0"
          endpoint:
            component: VANODE
            pin: N
      analysis:
        type: tran
        stop_time_us: 100
        max_step_us: 0.2
      stimuli:
        - name: reverse_bias_offset
          description: Cathode is about 120 V above a non-ground anode.
      probes:
        - name: reverse_voltage
          expression: V(cathode,anode)
      assertions:
        - name: reverse_voltage_reaches_fault_level
          probe: reverse_voltage
          at_us: 50
          relation: above
          threshold_v: 110
