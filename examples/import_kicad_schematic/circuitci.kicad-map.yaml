libraries:
  - ../../libs/generic
  - ../../libs/vendor/onsemi/diodes
libsource_rules:
  - lib: Device
    part: R
    model: generic.analog.resistor
    pin_map:
      "1": A
      "2": B
    spice:
      primitive: resistor
      value_ohm_from: schematic_value
  - lib: Device
    part: C
    model: generic.analog.capacitor
    pin_map:
      "1": A
      "2": B
    spice:
      primitive: capacitor
      value_f_from: schematic_value
components:
  V1:
    model: generic.analog.dc_voltage_source
    pin_map:
      "1": P
      "2": N
    spice:
      primitive: dc_voltage_source
      dc_v: 3.3
  D1:
    model: vendor.onsemi.1n4148ws
    pin_map:
      "1": A
      "2": K
  U1:
    model: generic.schematic.imported_component
nets:
  +3V3:
    kind: power
    nominal_voltage: 3.3
    powered: true
  GND:
    kind: ground
analog_scenarios:
  - name: kicad_mapped_rc_transient
    backend: auto
    components: [V1, R1, D1, C1]
    ground_net: GND
    model_files:
      - path: ../../models/spice/onsemi/1n4148ws.lib
        sha256: dee84e9189e05a9af600a0224a63cb6d01ebec4df27ff4ed12baeddd34869504
    analysis:
      type: tran
      stop_time_us: 2000.0
      max_step_us: 10.0
    stimuli:
      - name: mapped_dc_source
        description: V1 is explicitly mapped as a 3.3 V DC source.
    probes:
      - name: reset_rc_voltage
        expression: V(net_reset_rc)
        quantity: voltage
    assertions:
      - name: rc_node_charges
        probe: reset_rc_voltage
        at_us: 2000.0
        relation: above
        threshold_v: 2.5
