project:
  name: bad_solder_paste_opening_undersized_board_metadata
  version: 0.1.0
libraries:
  - ../../libs/generic
board:
  components: {}
  nets: {}
  manufacturing:
    min_paste_area_ratio: 0.7
    max_paste_area_ratio: 1.0
    source: package_stencil_order
  layout:
    copper:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Cu
          polarity: dark
          owner_kind: pad
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D10
          shape: rect
          size: { x_mm: 1.0, y_mm: 0.8 }
    solder_paste:
      features:
        - at: { x_mm: 10.0, y_mm: 10.0 }
          layer: F.Paste
          polarity: dark
          source_primitive: gerber_flash
          source_primitive_index: 0
          aperture: D11
          shape: rect
          size: { x_mm: 0.7, y_mm: 0.5 }
scenarios:
  - name: solder_paste_opening
    type: manufacturing
    checks:
      - SOLDER_PASTE_OPENING_VALID
    parameters:
      max_copper_to_paste_center_offset_mm: 0.05
