project:
  name: import_kicad_usb_curved_board_edge_checks
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    J1:
      model: generic.connector.usb2
      part_number: USB2_CONNECTOR
      pins:
        VBUS: usb_vbus
        "D+": usb_dp
        "D-": usb_dm
        GND: gnd
  nets:
    usb_vbus:
      kind: power
      nominal_voltage: 5.0
      powered: true
    usb_dp:
      kind: digital_or_analog
      nominal_voltage: 3.3
    usb_dm:
      kind: digital_or_analog
      nominal_voltage: 3.3
    gnd:
      kind: ground

scenarios:
  - name: usb_connector_orientation_from_curved_edge
    type: interface_protection
    checks:
      - USB_CONNECTOR_ORIENTATION_VALID
    target:
      component: J1
    parameters:
      expected_connector_rotation_deg: 0.0
      max_connector_rotation_error_deg: 360.0
  - name: usb_connector_edge_proximity_from_curved_edge
    type: interface_protection
    checks:
      - USB_CONNECTOR_EDGE_PROXIMITY_VALID
    target:
      component: J1
    parameters:
      max_connector_to_board_edge_distance_mm: 0.05
  - name: usb_connector_body_overhang_from_curved_edge
    type: interface_protection
    checks:
      - USB_CONNECTOR_BODY_OVERHANG_VALID
    target:
      component: J1
    parameters:
      max_connector_body_overhang_mm: 0.2
