project:
  name: bad_reset_supervisor_delay
  version: 0.1.0

libraries:
  - ../../libs/generic

board:
  components:
    U1:
      model: generic.mcu.basic
      part_number: GENERIC_MCU
      power_domains:
        VDD: mcu_3v3
      pins:
        VDD: mcu_3v3
        GND: gnd
        NRST: nrst
  nets:
    mcu_3v3:
      kind: power
      nominal_voltage: 3.3
      powered: true
      power_valid_at_us: 1200
    gnd:
      kind: ground
    nrst:
      kind: digital_or_analog

scenarios:
  - name: reset_supervisor_delay_too_short
    type: reset_boot
    target:
      component: U1
      power_pin: VDD
      reset_pin: NRST
    checks:
      - RESET_RELEASE_AFTER_POWER_VALID
    timing:
      power_valid_at_us: 1200
      reset_release_delay_us: 500
      reset_release_at_us: 1500
      boot_sample_at_us: 1600
