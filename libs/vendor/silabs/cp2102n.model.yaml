    DCD: DCD
    RI: RI
    GND: GND
  absolute_maximum_ratings:
    VDD:
      conditions: Voltage on VDD with respect to GND.
      value: 4.2
      unit: V
    VIO:
      conditions: Voltage on VIO with respect to GND.
      value: 4.2
      unit: V
    VREGIN:
      conditions: Voltage on VREGIN with respect to GND.
      value: 5.8
      unit: V
    non_usb_io_when_vio_gt_3v3:
      conditions: Voltage on UART pins, GPIO, VBUS, RSTb, or any other non-power non-USB pin when VIO > 3.3 V.
      value: 5.8
      unit: V
    non_usb_io_when_vio_lt_3v3:
      conditions: Voltage on UART pins, GPIO, VBUS, RSTb, or any other non-power non-USB pin when VIO < 3.3 V; limit is VIO + 2.5 V.
      value: 2.5
      unit: V
  electrical_characteristics:
    VDD:
      min: 3.0
      max: 3.6
      unit: V
    VIO:
      min: 1.71
      max: 3.6
      unit: V
      conditions: VIO must be less than or equal to VDD; static maximum shown for schema-compatible board screening.
    VREGIN:
      min: 3.0
      max: 5.25
      unit: V
    IDD_normal_115200:
      typ: 9.5
      unit: mA
    IDD_normal_3Mbaud:
      typ: 13.7
      unit: mA
    VREGOUT:
      conditions: VREGIN >= 4.1 V, output current 1 mA to 100 mA
      min: 3.1
      typ: 3.3
      max: 3.6
      unit: V
    IREGOUT:
      max: 100
      unit: mA
    VDROPOUT:
      conditions: output current 100 mA
      max: 0.8
      unit: V
    GPIO_VOH_high_drive:
      conditions: IOH = -7 mA, VIO >= 3.0 V
      min: 2.6
      unit: V
    GPIO_VIL:
      max: 0.6
      unit: V
    GPIO_VIH:
      conditions: VIO = 3.3 V board-level threshold approximation from VIH >= VIO - 0.6 V.
      min: 2.7
      unit: V
    GPIO_leakage_above_vio:
      conditions: VIO < VIN < VIO + 2.0 V
      typ: 5
      max: 150
      unit: uA
  device_parameters:
    integrated_usb_uart:
      conditions: Integrated USB 2.0 full-speed function controller, USB transceiver, oscillator, and UART.
      unit: note
      simulation_relevance: Board validation should treat the bridge as a functional black box, not transistor-level USB logic.
    reset_pullup:
      conditions: Datasheet recommends a 1 kOhm pull-up on RSTb to VIO, or to VDD when VIO is tied to VDD.
      unit: note
      simulation_relevance: Supports reset-net review when the bridge reset pin is wired into board reset circuits.
    uart_modem_pins:
      conditions: UART includes TXD/RXD plus RTS, CTS, DSR, DTR, DCD, and RI control signals.
      unit: note
      simulation_relevance: Supports serial bootloader and host-controlled reset/boot strap validation.
