  device_parameters:
    charge_current_programming:
      conditions: Fast-charge current is programmed by a resistor from ISET to VSS; Board IR must declare programmed_charge_current_A from the schematic resistor or board configuration.
      unit: note
      simulation_relevance: Static power-tree validation compares programmed charge current against charger range and input-source current budget.
    input_current_limit_programming:
      conditions: ILIM, EN1, and EN2 set the maximum input current. CircuitCI currently uses the declared input rail supply_current_limit_A as the policy source-current budget.
      unit: note
      simulation_relevance: Static validation can catch programmed charge current above a USB/source current budget but does not yet derive the budget from ILIM/EN states.
    power_path:
      conditions: OUT powers the system load while BAT charges and can enter battery supplement mode.
      unit: note
      simulation_relevance: Static validation does not model DPPM, supplement-mode transient sharing, or thermal foldback.
