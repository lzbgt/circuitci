    VIO:
      conditions: Voltage on input or output pins
      value: 0.5
      unit: V_above_VCC
  electrical_characteristics:
    VCC_5V_mode:
      conditions: V3 only connected to external capacitor
      min: 4.0
      typ: 5.0
      max: 5.3
      unit: V
    VCC_3V3_mode_ch340c:
      conditions: V3 connected to VCC, CH340C/N/K/E/X/B
      min: 3.1
      typ: 3.3
      max: 3.6
      unit: V
    ICC_5V_mode:
      conditions: CH340G/C/N/K/E/X/T/R at VCC=5V
      typ: 7
      max: 20
      unit: mA
    ICC_3V3_mode:
      conditions: CH340G/C/N/K/E/X/T/R at VCC=V3=3.3V
      typ: 4
      max: 12
      unit: mA
    VIH_3V3_mode:
      conditions: VCC=V3=3.3V
      min: 1.9
      unit: V
    VIL_3V3_mode:
      conditions: VCC=V3=3.3V
      min: 0
      max: 0.8
      unit: V
    VOH_3V3_mode:
      conditions: 2mA sourced current, VCC=V3=3.3V
      min: 2.7
      unit: V
    VOL_3V3_mode:
      conditions: 4mA sunk current, VCC=V3=3.3V
      max: 0.5
      unit: V
  device_parameters:
    integrated_clock:
      conditions: CH340C/N/K/E/X/B have integrated clock generator and require no external crystal.
      unit: note
      simulation_relevance: Schematic review should not require XI/XO crystal circuitry for CH340C.
    uart_idle:
      conditions: RXD keeps high when UART reception is idle; TXD of CH340C keeps high when UART transmission is idle.
      unit: note
      simulation_relevance: Helps agents reason about default UART line behavior without modeling the USB core.
    modem_outputs:
      conditions: DTR# and RTS# are MODEM output signals, active low.
      unit: note
      simulation_relevance: Supports reset/BOOT control-line validation without transistor-level USB-UART internals.
    separate_supply_backfeed_guidance:
      conditions: WCH reference text recommends shared CH340/MCU power to avoid I/O current through the UART connection, or a separate-supply circuit that avoids bidirectional current poured backwards.
      unit: note
      simulation_relevance: Use GPIO_BACKDRIVE or analog_transient scenarios when CH340 and target MCU can be powered separately.
