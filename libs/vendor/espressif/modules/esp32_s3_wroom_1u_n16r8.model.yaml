component_id: vendor.espressif.esp32_s3_wroom_1u_n16r8
version: 0.1.0
category: mcu
ports:
  3V3:
    kind: electrical_power
    required: true
    electrical:
      operating_voltage_min_V: 3.0
      operating_voltage_max_V: 3.6
      max_supply_current_A: 0.5
  GND:
    kind: electrical_ground
    required: true
  EN:
    kind: digital_electrical_input
    required: true
    electrical:
      vih_min_V: 2.475
      vil_max_V: 0.825
      injection_current_limit_A: 0.0001
  IO0:
    kind: digital_electrical_io
    required: true
    electrical:
      vih_min_V: 2.475
      vil_max_V: 0.825
      injection_current_limit_A: 0.0001
  IO46:
    kind: digital_electrical_io
    required: false
    electrical:
      vih_min_V: 2.475
      vil_max_V: 0.825
      injection_current_limit_A: 0.0001
  IO19:
    kind: digital_electrical_io
    required: false
    electrical:
      injection_current_limit_A: 0.0001
  IO20:
    kind: digital_electrical_io
    required: false
    electrical:
      injection_current_limit_A: 0.0001
  TXD0:
    kind: digital_electrical_output
    required: false
    electrical:
      drive_high_voltage_V: 2.64
      source_impedance_ohm: 82.5
  RXD0:
    kind: digital_electrical_input
    required: false
    electrical:
      vih_min_V: 2.475
      vil_max_V: 0.825
      injection_current_limit_A: 0.0001
behavior:
  reset:
    pin: EN
    active: low
  boot:
    sample_time_after_reset_release_us: 3000
    modes:
      spi_flash:
        straps:
          - pin: IO0
            required_state: high
      joint_download:
        straps:
          - pin: IO0
            required_state: low
          - pin: IO46
            required_state: low
rules:
  - POWER_TREE_VALID
  - RESET_RELEASE_AFTER_POWER_VALID
  - BOOT_STRAP_DEFINED
  - BOOT_STRAP_BIAS_VALID
datasheet:
  manufacturer: Espressif Systems
  part_number: ESP32-S3-WROOM-1U-N16R8
  package: 41-pin SMD module with external antenna connector
  polarity: wifi_bluetooth_le_mcu_module
  pinout:
    3V3: 3V3
    GND: GND
    EN: EN
    IO0: IO0
    IO46: IO46
    IO19: USB_D-
    IO20: USB_D+
    TXD0: U0TXD
    RXD0: U0RXD
  electrical_characteristics:
    module_supply_voltage:
      conditions: Recommended operating condition, VDD33.
      min: 3.0
      typ: 3.3
      max: 3.6
      unit: V
    external_supply_current:
      conditions: Recommended minimum supply current, IVDD.
      min: 0.5
      unit: A
    gpio_input_high:
      conditions: DC characteristics at 3.3 V; VIH = 0.75 x VDD.
      min: 2.475
      unit: V
    gpio_input_low:
      conditions: DC characteristics at 3.3 V; VIL = 0.25 x VDD.
      max: 0.825
      unit: V
    chip_enable_high:
      conditions: EN pin input-high threshold.
      min: 2.475
      unit: V
    chip_enable_low:
      conditions: EN pin input-low threshold.
      max: 0.825
      unit: V
  device_parameters:
    gpio0_default_strap:
      value: 1
      unit: logic
      simulation_relevance: GPIO0 has an internal pull-up and selects SPI flash versus download boot.
    gpio46_default_strap:
      value: 0
      unit: logic
      simulation_relevance: GPIO46 has an internal pull-down and must be low with GPIO0 low for joint download boot.
    strap_hold_time:
      conditions: Strapping hold time after CHIP_PU rises.
      value: 3
      unit: ms
      simulation_relevance: Boot strap sample timing is modeled as reset release plus this hold time.
