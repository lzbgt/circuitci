      sha256: 1dabd3a7eecee58e2852aaacd6af6f811f4f5d01235211de5ab8486cc001cf40
      retrieved: 2026-06-13
    - title: ESP32 Hardware Design Guidelines
      path: docs/research/datasheets/espressif/esp32_hardware_design_guidelines_en.pdf
      source_url: https://docs.espressif.com/projects/esp-hardware-design-guidelines/en/latest/esp32/esp-hardware-design-guidelines-en-master-esp32.pdf
      sha256: c37ebba953555065e0c5cb884cb6ce61a9cf7509bc6b7ec6514b501aebef8424
      retrieved: 2026-06-13
