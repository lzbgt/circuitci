component_id: generic.mcu.basic
version: 0.1.0
category: mcu
ports:
  VDD:
    kind: electrical_power
    required: true
    electrical:
      operating_voltage_min_V: 2.7
      operating_voltage_max_V: 3.6
      max_supply_current_A: 0.03
  GND:
    kind: electrical_ground
    required: true
  RX:
    kind: digital_electrical_input
    required: false
    electrical:
      vih_min_V: 2.0
      vil_max_V: 0.8
      injection_current_limit_A: 0.0001
  TX:
    kind: digital_electrical_output
    required: false
    electrical:
      drive_high_voltage_V: 3.3
      source_impedance_ohm: 50
  NRST:
    kind: digital_electrical_input
    required: false
    electrical:
      vih_min_V: 2.0
      vil_max_V: 0.8
      injection_current_limit_A: 0.0001
  BOOT0:
    kind: digital_electrical_input
    required: false
    electrical:
      vih_min_V: 2.0
      vil_max_V: 0.8
      injection_current_limit_A: 0.0001
  OSC_IN:
    kind: passive
    required: false
  OSC_OUT:
    kind: passive
    required: false
behavior:
  reset:
    pin: NRST
    active: low
    min_assert_us: 20
  boot:
    sample_time_after_reset_release_us: 100
    modes:
      bootloader:
        straps:
          - pin: BOOT0
            required_state: high
      application:
        straps:
          - pin: BOOT0
            required_state: low
  bootloader:
    interfaces:
      uart:
        rx_pin: RX
        tx_pin: TX
        sync_byte: 127
        ack_byte: 121
rules:
  - GPIO_BACKDRIVE
  - RESET_RELEASE_AFTER_POWER_VALID
  - BOOT_STRAP_DEFINED
  - BOOT_STRAP_BIAS_VALID
  - UART_BOOTLOADER_SYNC
  - CLOCK_SOURCE_VALID
clock_sources:
  - name: hse
    input_pin: OSC_IN
    output_pin: OSC_OUT
    stray_capacitance_F: 2.0e-12
model_quality:
  source: generic
  confidence: low
  intended_use:
    - power_sequence
    - leakage
  not_valid_for:
    - rf
    - high_speed_signal_integrity
    - transistor_level_mcu_behavior
